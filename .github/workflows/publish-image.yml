name: Publish build image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Containerfile
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Containerfile
          push: true
          tags: ghcr.io/oasdflkjo/stm32-vibe-build:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
