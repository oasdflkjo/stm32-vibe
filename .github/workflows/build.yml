name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build container image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Containerfile
          tags: stm32-vibe-build:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build firmware
        run: docker run --rm -v "$PWD:/workspace" -w /workspace stm32-vibe-build make clean firmware
